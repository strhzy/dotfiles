# Профиль Шуанпинь
ShuangpinProfile=Ziranma
# Показать текущий режим шуанпинь
ShowShuangpinMode=True
# Количество слов-кандидатов на страницу
PageSize=7
# Показать кандидаты на английском языке
SpellEnabled=True
# Показать кандидаты-символы
SymbolsEnabled=True
# Показать кандидаты Чайцзы
ChaiziEnabled=True
# Включить больше символов после Unicode CJK Extension B
ExtBEnabled=True
# Показывать варианты штрихов при наборе с h(一), s(丨), p(丿), n(㇏), z(𠃍)
StrokeCandidateEnabled=True
# Включить Cloud Pinyin
CloudPinyinEnabled=True
# Порядок слов-кандидатов в Cloud Pinyin
CloudPinyinIndex=2
# Показывать анимацию при загрузке Cloud Pinyin
CloudPinyinAnimation=True
# Всегда отображать текст-заполнитель Cloud Pinyin
KeepCloudPinyinPlaceHolder=False
# Режим Предварительного Редактирования
PreeditMode="Composing pinyin"
# Зафиксировать встроенный курсор предварительного редактирования в начале.
PreeditCursorPositionAtBeginning=True
# Показать полный Пиньинь в предварительном редактировании
PinyinInPreedit=False
# Включить прогнозирование
Prediction=False
# Сохранить текущий набранный текст для прогнозирования следующего ввода
KeepCurrentContext=True
# Количество прогнозов
PredictionSize=49
# Поведение клавиши Backspace при прогнозировании
BackspaceBehaviorOnPrediction="Backspace when not using on-screen keyboard"
# Действие при переключении метода ввода
SwitchInputMethodBehavior="Commit current preedit"
# Выбрать второе слово-кандидат
SecondCandidate=
# Выбрать третье слово-кандидат
ThirdCandidate=
# Использовать Keypad в качестве клавиши выбора
UseKeypadAsSelection=False
# Использовать BackSpace, чтобы отменить выбор
BackSpaceToUnselect=True
# Количество предложений
Number of sentence=2
# Количество фраз-кандидатов
WordCandidateLimit=15
# Запрашивать большую длину слова, когда длина ввода превышает (0 для отключения)
LongWordLengthLimit=4
# Клавиша для активации быстрой фразы
QuickPhraseKey=semicolon
# Использовать V для переключения быстрой фразы
VAsQuickphrase=True
# FirstRun
FirstRun=False

[ForgetWord]
0=Control+7

[PrevPage]
0=minus
1=Up
2=KP_Up
3=Page_Up

[NextPage]
0=equal
1=Down
2=KP_Down
3=Next

[PrevCandidate]
0=Shift+Tab

[NextCandidate]
0=Tab

[CurrentCandidate]
0=space
1=KP_Space

[CommitRawInput]
0=Return
1=KP_Enter
2=Control+Return
3=Control+KP_Enter
4=Shift+Return
5=Shift+KP_Enter
6=Control+Shift+Return
7=Control+Shift+KP_Enter

[ChooseCharFromPhrase]
0=bracketleft
1=bracketright

[FilterByStroke]
0=grave

[QuickPhraseTriggerRegex]
0=.(/|@)$
1=^(www|bbs|forum|mail|bbs)\\.
2=^(http|https|ftp|telnet|mailto):

[Fuzzy]
# ue -> ve
VE_UE=True
# Распространённая опечатка
NG_GN=True
# Внутренний сегмент (xian -> xi'an)
Inner=True
# Внутренний сегмент для короткого Пиньинь (qie -> qi'e)
InnerShort=True
# Частичное  совпадение окончаний (e -> en, eng, ei)
PartialFinal=True
# Совпадение с частичным двойным пиньинем, если длина ввода больше 4
PartialSp=False
# u <-> v
V_U=False
# an <-> ang
AN_ANG=False
# en <-> eng
EN_ENG=False
# ian <-> iang
IAN_IANG=False
# in <-> ing
IN_ING=False
# u <-> ou
U_OU=False
# uan <-> uang
UAN_UANG=False
# c <-> ch
C_CH=False
# f <-> h
F_H=False
# l <-> n
L_N=False
# l <-> r
L_R=False
# s <-> sh
S_SH=False
# z <-> zh
Z_ZH=False
# Исправление раскладки
Correction=None

